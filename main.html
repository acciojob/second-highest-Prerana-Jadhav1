<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>	
	<script>
		function secondHighest(arr) {
			let maxElement=parseInt(arr[0]);

			for (let i = 0; i < arr.length; i++) {
				if (parseInt(arr[i])>maxElement) {
					maxElement=parseInt(arr[i]);
				}
			}

			let res=Number.MIN_SAFE_INTEGER;
			for (let i = 0; i < arr.length; i++) {
				if (parseInt(arr[i])>res && parseInt(arr[i])<maxElement) {
					res=parseInt(arr[i]);
				}
			}

			return res===Number.MIN_SAFE_INTEGER ? "-Infinity" : res;
		}

		function Main() {
			var n = prompt("Enter the number of elements");
			var arr = [];
			for (var i = 0; i < n; i++) {
				arr[i] = prompt("Enter element " + (i+1));
			}
			alert(secondHighest(arr));  
		}
		Main();
	</script>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
